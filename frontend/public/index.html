<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f3f3f1" />
    <meta name="description" content="RExplain — Instantly understand any GitHub repository. Architecture, stack, and structure at a glance." />
    <title>RExplain — Unfold any GitHub repository</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "primary": "#ffffff",
              "surface-container-lowest": "#1c1c1c",
              "tertiary": "#a855f7",
              "accent-orange": "#f97316",
              "background": "#121212",
              "on-background": "#f3f3f1",
              "secondary": "#a3a3a3",
              "outline": "rgba(255, 255, 255, 0.05)",
              "accent-purple": "#a855f7",
              "bg-page": "#121212",
              "bg-subtle": "rgba(255, 255, 255, 0.03)",
              "border-subtle": "rgba(255, 255, 255, 0.05)"
            },
            "borderRadius": {
              "DEFAULT": "0.125rem",
              "lg": "0.25rem",
              "xl": "0.5rem",
              "2xl": "1.5rem",
              "3xl": "2rem",
              "full": "0.75rem"
            },
            "fontFamily": {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            "animation": {
              "shimmer": "shimmer 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite",
              "liquid-pulse": "liquidPulse 4s cubic-bezier(0.4, 0, 0.2, 1) infinite",
              "breathing": "breathing 3s ease-in-out infinite",
              "slow-spin": "spin 8s linear infinite",
              "reveal-up": "revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards",
              "draw-line": "drawLine 2s ease-in-out forwards",
              "shine": "shine 12s ease-in-out infinite",
              "fadeInTitle": "fadeInTitle 2.5s ease-out forwards",
              "slideUpFade": "slideUpFade 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both"
            },
            "keyframes": {
              shimmer: {
                "0%": { transform: "translateX(-100%)" },
                "100%": { transform: "translateX(200%)" }
              },
              liquidPulse: {
                "0%, 100%": { transform: "scale(1)", opacity: "0.3", filter: "blur(8px)" },
                "50%": { transform: "scale(1.4)", opacity: "0.6", filter: "blur(12px)" }
              },
              breathing: {
                "0%, 100%": { opacity: "1" },
                "50%": { opacity: "0.5" }
              },
              revealUp: {
                "0%": { opacity: "0", transform: "translateY(20px)" },
                "100%": { opacity: "1", transform: "translateY(0)" }
              },
              drawLine: {
                "0%": { width: "0%" },
                "100%": { width: "100%" }
              },
              shine: {
                "0%": { "background-position": "-100% center" },
                "100%": { "background-position": "100% center" }
              },
              fadeInTitle: {
                from: { opacity: "0", transform: "translateY(10px)" },
                to: { opacity: "1", transform: "translateY(0)" }
              },
              slideUpFade: {
                from: { opacity: "0", transform: "translateY(20px)" },
                to: { opacity: "1", transform: "translateY(0)" }
              }
            }
          },
        },
      };
    </script>

  </head>
  <body class="bg-page text-on-background antialiased selection:bg-tertiary selection:text-white">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
